<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tothemooon000 • To The Moon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a1f 100%);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      color: white;
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><text y='28' font-size='28'>🚀</text></svg>") 16 16, auto;
    }

    /* Stars Background */
    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 1;
      pointer-events: none;
    }

    /* Moon */
    .moon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      background: radial-gradient(circle at 40% 40%, #f0f0f0, #ddd 40%, #aaa);
      border-radius: 50%;
      box-shadow: 
        0 0 80px 30px rgba(165, 243, 252, 0.8),
        0 0 140px 60px rgba(103, 232, 249, 0.4),
        inset 60px 60px 80px rgba(255,255,255,0.6),
        inset -40px -40px 60px rgba(0,0,0,0.4);
      z-index: 2;
      animation: pulse 8s ease-in-out infinite;
    }

    .moon::after {
      content: '';
      position: absolute;
      top: 30%;
      left: 35%;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      filter: blur(10px);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 80px 30px rgba(165, 243, 252, 0.8), 0 0 140px 60px rgba(103, 232, 249, 0.4); }
      50% { box-shadow: 0 0 100px 50px rgba(165, 243, 252, 0.95), 0 0 180px 80px rgba(103, 232, 249, 0.6); }
    }

    /* Content */
    .content {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      max-width: 600px;
    }

    .title {
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: -4px;
      text-shadow: 0 0 40px rgba(103, 232, 249, 0.7);
    }

    .subtitle {
      font-size: 1.4rem;
      opacity: 0.9;
      margin-top: 8px;
    }

    .rocket-trail {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 80px;
      background: linear-gradient(transparent, #67e8f9);
      opacity: 0.3;
      transform: translate(-50%, -100%) rotate(180deg);
      animation: trail 3s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes trail {
      0% { height: 60px; opacity: 0.4; }
      100% { height: 120px; opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Stars Container -->
  <div class="stars" id="stars"></div>

  <!-- Moon -->
  <div class="moon"></div>

  <!-- Content -->
  <div class="content">
    <h1 class="title text-cyan-300">tothemooon000</h1>
    <p class="subtitle">To The Moon or Nothing 🌕🚀</p>
    <p class="mt-8 text-sm opacity-70 max-w-md mx-auto">
      Digital Creator • Visual Curator • Moon Chaser<br>
      Dari Indonesia, siap bawa ide kamu ke level berikutnya.
    </p>
    
    <div class="mt-10 flex justify-center gap-6 text-2xl">
      <a href="https://instagram.com/tothemooon000" target="_blank" class="hover:scale-125 transition">📷</a>
      <a href="https://x.com/tothemooon000" target="_blank" class="hover:scale-125 transition">𝕏</a>
      <a href="#" class="hover:scale-125 transition">✉️</a>
    </div>
  </div>

  <script>
    // Generate random stars
    function createStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 300; i++) {
        const star = document.createElement('div');
        const size = Math.random() * 3 + 1;
        star.style.position = 'absolute';
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.backgroundColor = 'white';
        star.style.borderRadius = '50%';
        star.style.top = `${Math.random() * 100}vh`;
        star.style.left = `${Math.random() * 100}vw`;
        star.style.opacity = Math.random() * 0.8 + 0.2;
        star.style.boxShadow = `0 0 ${size * 2}px white`;
        star.style.animation = `twinkle ${Math.random() * 4 + 3}s infinite alternate`;
        starsContainer.appendChild(star);
      }
    }

    // Twinkle animation
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes twinkle {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
      }
    `;
    document.head.appendChild(style);

    // Initialize
    window.onload = () => {
      createStars();
      console.log("%c🚀 tothemooon000 Web App Ready - Cursor is now a rocket!", "color:#67e8f9; font-size:16px; font-weight:bold");
    };
  </script>
</body>
</html>
